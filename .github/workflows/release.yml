name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".changeset/**"
      - ".github/workflows/release.yml"
      - "pnpm-lock.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter './packages/*' build

      - run: pnpm -r --filter './packages/*' typecheck

      - run: pnpm test -- --run

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  docs-artifacts:
    name: Publish docs artifacts
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter './packages/*' build

      - name: Install docs tooling
        run: npm i -g @directive-run/toolkit@latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract API docs
        run: |
          mkdir -p docs-artifacts
          extract-api-docs \
            --packages packages/core,packages/ai \
            --out docs-artifacts

      - name: Bundle knowledge
        run: |
          if [ -d "packages/knowledge/core" ]; then
            tar czf docs-artifacts/knowledge.tar.gz \
              -C packages/knowledge core/ examples/ api-skeleton.md 2>/dev/null || true
          fi

      - name: Upload release assets
        run: |
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          if [ -n "$TAG" ]; then
            gh release upload "$TAG" docs-artifacts/* --clobber || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger docs deploy
        if: vars.VERCEL_DEPLOY_HOOK_DOCS != ''
        run: curl -sS -X POST "$HOOK_URL"
        env:
          HOOK_URL: ${{ vars.VERCEL_DEPLOY_HOOK_DOCS }}
