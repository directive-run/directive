name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter './packages/*' build

      - run: pnpm test -- --run

      - run: pnpm lint

      - run: pnpm -r --filter './packages/*' typecheck

      - name: Check knowledge freshness
        run: |
          pnpm --filter @directive-run/knowledge generate
          git diff --exit-code packages/knowledge/api-skeleton.md

      - name: Check plugin skills freshness
        run: |
          pnpm --filter @directive-run/claude-plugin build
          git diff --exit-code packages/claude-plugin/skills/
