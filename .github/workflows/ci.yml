name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter './packages/*' build

      - run: pnpm test -- --run

      - run: pnpm lint

      - run: pnpm -r --filter './packages/*' typecheck

      - name: Check knowledge freshness
        run: |
          pnpm --filter @directive-run/knowledge generate
          git diff --exit-code packages/knowledge/api-skeleton.md

      - name: Check plugin skills freshness
        run: |
          pnpm --filter @directive-run/claude-plugin build
          git diff --exit-code packages/claude-plugin/skills/
