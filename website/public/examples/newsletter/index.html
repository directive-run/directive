<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Signup - Directive Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .app { max-width: 480px; width: 100%; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #64748b; margin-bottom: 1.5rem; font-size: 0.875rem; }
    .form { display: flex; flex-direction: column; gap: 1rem; }
    label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input {
      width: 100%; background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 0.625rem 0.75rem; color: #e2e8f0;
      font-size: 0.875rem; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #3b82f6; }
    .error-text { color: #f87171; font-size: 0.75rem; margin-top: 0.25rem; min-height: 1rem; }
    .controls { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.5rem; }
    button {
      background: #3b82f6; border: none; color: white;
      padding: 0.625rem 1.25rem; border-radius: 8px; cursor: pointer;
      font-size: 0.875rem; font-weight: 600; transition: all 0.15s;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-banner {
      padding: 0.75rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem;
    }
    .status-success { background: #064e3b; border: 1px solid #065f46; color: #6ee7b7; }
    .status-error { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
    .status-submitting { background: #1e3a5f; border: 1px solid #1e40af; color: #93c5fd; }
    .hidden { display: none; }
    #log {
      margin-top: 1.5rem; background: #0f172a; border: 1px solid #1e293b;
      border-radius: 8px; padding: 0.75rem; text-align: left;
      font-family: monospace; font-size: 0.7rem; color: #64748b;
      max-height: 150px; overflow-y: auto;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-0dyuYT9Y.js"></script>
</head>
<body>
  <div class="app">
    <h1>Newsletter Signup</h1>
    <p class="subtitle">Directive example &mdash; facts, derivations, constraints, resolvers, effects</p>

    <div id="status-banner" class="status-banner hidden"></div>

    <div class="form">
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
        <div id="email-error" class="error-text"></div>
      </div>

      <div class="controls">
        <button id="submit-btn">Subscribe</button>
      </div>
    </div>

    <div id="log"></div>
  </div>

</body>
</html>
