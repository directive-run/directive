<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A/B Testing &ndash; Directive Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .app { max-width: 700px; width: 100%; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f1f5f9; }
    .subtitle { color: #64748b; margin-bottom: 2rem; font-size: 0.875rem; }
    h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .stats {
      display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .stat {
      background: #1e293b; padding: 0.75rem 1.25rem; border-radius: 10px;
      border: 1px solid #334155; flex: 1; min-width: 120px;
    }
    .stat-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 0.25rem; }

    .experiment {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 1.25rem; margin-bottom: 1rem;
    }
    .experiment-name { font-weight: 600; font-size: 0.95rem; color: #f1f5f9; }
    .experiment-meta { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
    .experiment-variants {
      display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap;
    }
    .variant-btn {
      background: #0f172a; border: 1px solid #334155; color: #94a3b8;
      padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.15s;
    }
    .variant-btn:hover { border-color: #475569; color: #e2e8f0; }
    .variant-btn.active { border-color: #3b82f6; background: #1e3a5f; color: #93c5fd; font-weight: 600; }

    .controls {
      display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    button {
      background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
      padding: 0.6rem 1.25rem; border-radius: 8px; cursor: pointer;
      font-size: 0.85rem; transition: all 0.15s;
    }
    button:hover { background: #334155; }
    button.primary { background: #3b82f6; border-color: #3b82f6; }
    button.danger { background: #991b1b; border-color: #991b1b; }

    #log {
      background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
      padding: 0.75rem; font-family: monospace; font-size: 0.7rem;
      color: #64748b; max-height: 250px; overflow-y: auto;
    }
    #log .event { color: #60a5fa; }
    #log .constraint { color: #fbbf24; }
    #log .resolver { color: #34d399; }
  </style>
  <script type="module" crossorigin src="/examples/ab-testing/assets/index-BpWE9OqJ.js"></script>
</head>
<body>
  <div class="app">
    <h1>A/B Testing Engine</h1>
    <p class="subtitle">Constraint-driven experiment assignment and exposure tracking with Directive</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Experiments</div>
        <div id="experiment-count" class="stat-value" data-testid="ab-experiment-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Assigned</div>
        <div id="assigned-count" class="stat-value" data-testid="ab-assigned-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Exposed</div>
        <div id="exposed-count" class="stat-value" data-testid="ab-exposed-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">User ID</div>
        <div id="user-id" class="stat-value" data-testid="ab-user-id" style="font-size:0.85rem">-</div>
      </div>
    </div>

    <h2>Experiments</h2>
    <div id="experiments" data-testid="ab-experiments"></div>

    <div class="controls">
      <button id="btn-pause" class="primary" data-testid="ab-btn-pause">Pause All</button>
      <button id="btn-reset" class="danger" data-testid="ab-btn-reset">Reset</button>
    </div>

    <h2>Event Log</h2>
    <div id="log"></div>
  </div>

</body>
</html>
